{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'correlations/out.css' %}">
</head>

<body>
    <div class="min-h-screen bg-slate-100 px-4 py-8">
        <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-sm p-8">
        <article class="prose prose-neutral lg:prose-lg">
            {% if latest_entries %}
                <ul>
                {% for entry in latest_entries %}
                    <li>{{entry}}</li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No entries are available.</p>
            {% endif %}
            </article>
        </div>
</div>
</body>
</html>
